<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>404 - Quiz Time!</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: #FFC943;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
    }

    .container {
      max-width: 500px;
    }

    h1 {
      font-size: 80px;
      margin: 0;
    }

    .question {
      margin: 20px 0;
      font-size: 20px;
    }

    .answers button {
      display: block;
      margin: 10px auto;
      padding: 10px 20px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background: #fff;
      color: #333;
      transition: 0.3s;
    }

    .answers button:hover {
      background: #186B23;
      color: white;
    }

    #result {
      margin-top: 15px;
      font-weight: bold;
    }

    #score {
      margin-top: 10px;
      opacity: 0.8;
    }

    a {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: #00c6ff;
      color: white;
      text-decoration: none;
      border-radius: 20px;
    }

      .fa-solid-binoculars
      {
        position: absolute;
        top: 10px;
          
      }

  </style>
  
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
  

</head>
<body>

  <i class="fa-solid fa-binoculars fa-5x"></i>

<div class="container">
  <h1>404 🤔 </h1>
  
  <p>Page not found... but hey, lets get brainy!</p>

  <div class="question" id="question">Loading question...</div>

  <div class="answers" id="answers"></div>

  <div id="result"></div>
  <div id="score">Score: 0</div>

  <a href="/">Go Home</a>
</div>

<script>
const quiz = [
  {
    q: "Can you guess which of these 3 animals are completely extinct?",
    a: ["Malayan pangolin", "Malayan tapir", "Bali tiger,"],
    correct: 3
  },
  {
    q: "What does HTML stand for?",
    a: ["Hyper Trainer Marking Language", "HyperText Markup Language", "HighText Machine Language", "None"],
    correct: 1
  },
  {
    q: "Which one is a programming language?",
    a: ["HTML", "CSS", "JavaScript", "Photoshop"],
    correct: 2
  },
  {
    q: "Which company created the web?",
    a: ["Google", "Microsoft", "CERN", "Apple"],
    correct: 2
  }
];

let current = 0;
let score = 0;

const questionEl = document.getElementById("question");
const answersEl = document.getElementById("answers");
const resultEl = document.getElementById("result");
const scoreEl = document.getElementById("score");

function loadQuestion() {
  if (current >= quiz.length) {
    questionEl.textContent = "Quiz finished!";
    answersEl.innerHTML = "";
    resultEl.textContent = "Final Score: " + score + "/" + quiz.length;
    return;
  }

  const q = quiz[current];
  questionEl.textContent = q.q;
  answersEl.innerHTML = "";

  q.a.forEach((ans, i) => {
    const btn = document.createElement("button");
    btn.textContent = ans;
    btn.onclick = () => checkAnswer(i);
    answersEl.appendChild(btn);
  });
}

function checkAnswer(i) {
  if (i === quiz[current].correct) {
    resultEl.textContent = "✅ Correct!";
    score++;
  } else {
    resultEl.textContent = "❌ Wrong!";
  }

  scoreEl.textContent = "Score: " + score;
  current++;
  setTimeout(loadQuestion, 800);
}

loadQuestion();
</script>

</body>
</html>
